    <meta property="og:image:secure_url" content="https://cdn.fbsbx.com/v/t59.2708-21/721382085_27097545606614360_5177700272044715317_n.webp?_nc_cat=105&ccb=1-7&_nc_sid=de7c13&_nc_ohc=9CTlUUlGelgQ7kNvwEjPk-E&_nc_oc=AdrcaYiZ5CYonL124yPVTu2nkrU2IVFF0eHgaaAvBuEmbOg3lK7YiPLPpQyXTudpb64&_nc_zt=7&_nc_ht=cdn.fbsbx.com&_nc_gid=C92G0S98AADxepNIvrcYpg&_nc_ss=7b2a8&oh=03_Q7cD5gFsYBFiMV8qKblAp3WEjC5fCNjLt_ywmYKZ1Msatxl1KA&oe=6A2BBFEE">

    <title>Image Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 100%;
            text-align: center;
        }
        .image-wrapper {
            display: inline-block;
            max-width: 100%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        img {
            max-width: 100%;
            height: auto;
            display: block;
            border: none;
        }
        .fallback {
            color: #fff;
            padding: 50px;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="image-wrapper">
            <img 
                src="https://cdn.fbsbx.com/v/t59.2708-21/721382085_27097545606614360_5177700272044715317_n.webp?_nc_cat=105&ccb=1-7&_nc_sid=de7c13&_nc_ohc=9CTlUUlGelgQ7kNvwEjPk-E&_nc_oc=AdrcaYiZ5CYonL124yPVTu2nkrU2IVFF0eHgaaAvBuEmbOg3lK7YiPLPpQyXTudpb64&_nc_zt=7&_nc_ht=cdn.fbsbx.com&_nc_gid=C92G0S98AADxepNIvrcYpg&_nc_ss=7b2a8&oh=03_Q7cD5gFsYBFiMV8qKblAp3WEjC5fCNjLt_ywmYKZ1Msatxl1KA&oe=6A2BBFEE" 
                alt="Image"
                onerror="this.style.display='none'; document.getElementById('fallback').style.display='block';"
            >
            <div id="fallback" class="fallback" style="display: none;">
                Image load nahi hui. URL expire ho sakti hai.
            </div>
        </div>
    </div>
</body>
</html>
